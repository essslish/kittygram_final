name: Kittygram Workflow

on:
  push:
    branches: [ main ]

jobs:
  # Тестирование бэкенда
  tests_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r backend/requirements.txt
      
      - name: Test with ruff
        run: ruff check backend/
      
      - name: Run Django tests
        run: |
          cd backend
          python manage.py test
        env:
          POSTGRES_DB: kittygram_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432

  # Тестирование фронтенда
  tests_frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --watchAll=false --passWithNoTests

  # Сборка и отправка образа бэкенда
  build_backend:
    runs-on: ubuntu-latest
    needs: [tests_backend, tests_frontend]
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

  # Сборка и отправка образа фронтенда
  build_frontend:
    runs-on: ubuntu-latest
    needs: [tests_backend, tests_frontend]
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

  # Сборка и отправка образа gateway
  build_gateway:
    runs-on: ubuntu-latest
    needs: [tests_backend, tests_frontend]
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push gateway
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  # Отправка уведомления в Telegram
  send_notification:
    runs-on: ubuntu-latest
    needs: [build_backend, build_frontend, build_gateway]
    if: success()
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Kittygram workflow выполнен успешно!
            Репозиторий: ${{ github.repository }}
            Ветка: ${{ github.ref_name }}
            Автор: ${{ github.actor }}